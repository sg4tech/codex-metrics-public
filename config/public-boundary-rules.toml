allowed_roots = [
  ".githooks",
  ".github",
  ".gitignore",
  "CHANGELOG.md",
  "CONTRIBUTING.md",
  "Makefile",
  "README.md",
  "LICENSE",
  "config",
  "docs",
  "SECURITY.md",
  "pricing",
  "pyproject.toml",
  "scripts",
  "src",
  "tests",
  "tools",
]

forbidden_paths = [
  "AGENTS.md",
  "metrics",
  "docs/private",
]

forbidden_globs = [
  "*.sqlite",
  "**/*.sqlite",
  "*.db",
  "**/*.db",
  "*.log",
  "**/*.log",
]

forbidden_extensions = [
  ".sqlite",
  ".db",
  ".log",
]

forbidden_literal_markers = [
  "Internal only",
  "Do not publish",
]

forbidden_regex_markers = [
  "/Users/[^/]+/PycharmProjects/",
]

ignored_paths = [
  ".git/**",
  ".mypy_cache/**",
  ".pytest_cache/**",
  ".ruff_cache/**",
  ".venv/**",
  "build/**",
  "dist/**",
  "node_modules/**",
]

marker_ignored_paths = [
  "tests/public/test_public_boundary.py",
  "tests/private/test_git_hooks.py",
]
