name: package

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  verify-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build coverage mypy pytest ruff setuptools wheel

      - name: Verify
        run: make verify

      - name: Build package
        run: python -m build

      - name: Smoke check installed CLI
        run: |
          python -m pip install --force-reinstall dist/*.whl
          codex-metrics --help

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codex-metrics-dist
          path: dist/*

  standalone-binaries:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install standalone build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Build standalone binary
        run: python scripts/build_standalone.py

      - name: Smoke check standalone binary (Unix)
        if: runner.os != 'Windows'
        run: ./dist/standalone/codex-metrics --help

      - name: Smoke check standalone binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\dist\standalone\codex-metrics.exe --help

      - name: Upload standalone artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codex-metrics-standalone-${{ runner.os }}
          path: dist/standalone/*
