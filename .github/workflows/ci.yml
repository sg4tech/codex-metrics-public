name: ci

on:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install tooling and project
        run: |
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/python -m pip install build coverage mypy pytest ruff setuptools wheel
          ./.venv/bin/python -m pip install -e .

      - name: Verify
        run: make verify
